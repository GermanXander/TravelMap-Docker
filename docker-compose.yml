version: '3.8'

services:
  travelmap:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: travelmap
      DB_USER: traveluser
      DB_PASSWORD: travelpass
    depends_on:
      - mariadb
    volumes:
      - ./uploads:/var/www/html/uploads

  mariadb:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: travelmap
      MYSQL_USER: traveluser
      MYSQL_PASSWORD: travelpass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: